<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Menu Utama</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex;
    flex-direction:column;
}

.header{
    color:#fff;
    text-align:center;
    padding:20px 10px;
}

.header h1{
    font-size:30px;
}

.menu{
    flex:1;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:12px;
}

.menu a{
    text-decoration:none;
}

.card{
    width:100%;
    min-height:120px;
    border-radius:22px;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:12px;
    box-shadow:0 8px 18px rgba(0,0,0,.25);
    transition:.2s;
}

.card:hover{
    transform:translateY(-3px);
}

.card:active{
    transform:scale(.97);
}

.icon{
    font-size:42px;
    margin-bottom:8px;
}

.title{
    font-size:18px;
    font-weight:bold;
    line-height:1.3;
    word-break:break-word;
}

.absensi{
    background:#16a34a;
}

.terlambat{
    background:#f97316;
}

.nilai{
    background:#9333ea;
}

.observasi{
    background:#dc2626;
}

/* Tablet & Laptop */
@media (min-width:768px){

    .menu{
        grid-template-columns:repeat(4,1fr);
    }

    .card{
        min-height:160px;
    }

    .icon{
        font-size:48px;
    }

    .title{
        font-size:20px;
    }
}

/* HP */
@media (max-width:480px){

    .header h1{
        font-size:24px;
    }

    .card{
        min-height:110px;
        border-radius:18px;
    }

    .icon{
        font-size:34px;
        margin-bottom:6px;
    }

    .title{
        font-size:15px;
    }
}

/* HP sangat kecil */
@media (max-width:360px){

    .menu{
        gap:8px;
        padding:8px;
    }

    .card{
        min-height:95px;
    }

    .icon{
        font-size:28px;
    }

    .title{
        font-size:13px;
    }
}

</style>
</head>

<body>

<div class="header">
    <h1>ADMINISTRASI GURU</h1>
</div>

<div class="menu">

<a href="https://dianwiguna00.github.io/AdministrasiAbsensiSiswa1/">
<div class="card absensi">
<div class="icon">📋</div>
<div class="title">ABSENSI</div>
</div>
</a>

<a href="https://dianwiguna00.github.io/AdministrasiJurnalMengajar1/">
<div class="card absensi">
<div class="icon">📚</div>
<div class="title">JURNAL MENGAJAR</div>
</div>
</a>

<a href="https://dianwiguna00.github.io/AdministrasiDaftarNilaiSiswa1/">
<div class="card nilai">
<div class="icon">📝</div>
<div class="title">INPUT NILAI</div>
</div>
</a>

<a href="https://dianwiguna00.github.io/AdministrasiKeterlambatanSiswa1/">
<div class="card terlambat">
<div class="icon">⏰</div>
<div class="title">TERLAMBAT</div>
</div>
</a>

<a href="https://dianwiguna00.github.io/AdministrasiObservasiSiswa1/">
<div class="card observasi">
<div class="icon">⭐</div>
<div class="title">OBSERVASI</div>
</div>
</a>


</body>
</html>
