<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Menu Utama</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex;
    flex-direction:column;
}

.header{
    color:#fff;
    text-align:center;
    padding:10px 5px 30px;
}

.header h1{
    font-size:28px;
}

/* MENU */

.menu{
    flex:1;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px;
    padding:6px;
}

.menu a{
    text-decoration:none;
}

/* TOMBOL */

.card{
    position:relative;
    overflow:hidden;
    width:100%;
    min-height:140px;
    border-radius:22px;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:12px;
    box-shadow:0 8px 18px rgba(0,0,0,.25);
    animation:float 3s ease-in-out infinite;
    transition:.3s;
}

/* Efek kilau */

.card::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.20),
        transparent
    );
    animation:shine 4s linear infinite;
}

/* Gerakan bergantian */

.menu a:nth-child(2) .card{
    animation-delay:.5s;
}

.menu a:nth-child(3) .card{
    animation-delay:1s;
}

.menu a:nth-child(4) .card{
    animation-delay:1.5s;
}

.menu a:nth-child(5) .card{
    animation-delay:2s;
}

.card:hover{
    transform:translateY(-6px);
}

.card:active{
    transform:scale(.96);
}

.icon{
    font-size:60px;
    margin-bottom:8px;
    animation:bounce 2s infinite;
}

.title{
    font-size:24px;
    font-weight:bold;
    line-height:1.3;
}

/* WARNA */

.absensi{
    background:#16a34a;
}

.terlambat{
    background:#f97316;
}

.nilai{
    background:#9333ea;
}

.observasi{
    background:#dc2626;
}

/* ANIMASI */

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-6px);
    }
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-4px);
    }
}

@keyframes shine{
    0%{
        transform:translateX(-100%) rotate(25deg);
    }
    100%{
        transform:translateX(100%) rotate(25deg);
    }
}

/* TABLET & LAPTOP */

@media (min-width:768px){

    .menu{
        grid-template-columns:repeat(4,1fr);
        gap:12px;
        padding:12px;
    }

    .card{
        min-height:180px;
    }

    .icon{
        font-size:50px;
    }

    .title{
        font-size:20px;
    }
}

/* KHUSUS HP */

@media (max-width:480px){

    .header{
        padding:8px 5px;
    }

    .header h1{
        font-size:22px;
    }

    .menu{
        gap:4px;
        padding:4px;
    }

    .card{
        min-height:22vh; /* memenuhi layar */
        border-radius:18px;
    }

    .icon{
        font-size:60px;
    }

    .title{
        font-size:20px;
    }
}

/* HP SANGAT KECIL */

@media (max-width:360px){

    .menu{
        gap:3px;
        padding:3px;
    }

    .card{
        min-height:21vh;
    }

    .icon{
        font-size:32px;
    }

    .title{
        font-size:16px;
    }
}


/* Efek kilau */
.card::before{
    content:"";
    position:absolute;
    top:-100%;
    left:-100%;
    width:200%;
    height:200%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.25),
        transparent
    );
    transform:rotate(25deg);
    animation:shine 4s linear infinite;
}

/* Animasi kartu mengambang */
.card{
    animation:float 3s ease-in-out infinite;
}

/* Beda gerakan tiap tombol */
.menu a:nth-child(2) .card{
    animation-delay:.5s;
}

.menu a:nth-child(3) .card{
    animation-delay:1s;
}

.menu a:nth-child(4) .card{
    animation-delay:1.5s;
}

.menu a:nth-child(5) .card{
    animation-delay:2s;
}

/* Ikon bergerak */
.icon{
    font-size:42px;
    margin-bottom:8px;
    animation:bounce 2s infinite;
}

/* Hover */
.card:hover{
    transform:translateY(-8px) scale(1.04);
    box-shadow:0 15px 30px rgba(0,0,0,.35);
}

/* Animasi */
@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-5px);
    }
}

@keyframes shine{
    0%{
        transform:translateX(-100%) rotate(25deg);
    }
    100%{
        transform:translateX(100%) rotate(25deg);
    }
}

@media (max-width:480px){

    .card{
        animation:float 2.5s ease-in-out infinite;
    }

    .card:active{
        transform:scale(.92);
    }

    .icon{
        animation:bounce 1.5s infinite;
    }

}

</style>
</head>

<body>

</div>
